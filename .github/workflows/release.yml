name: Release

# Triggered by pushing a version tag: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, publish to npm, update Homebrew tap
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate oclif manifest
        run: npm run manifest

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Update Homebrew tap
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: rp
          formula-path: Formula/rp.rb
          homebrew-tap: redpennon/homebrew-tap
          tag-name: ${{ github.ref_name }}
          create-pullrequest: true
          commit-message: 'update rp to {{version}}'
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_PAT }}
