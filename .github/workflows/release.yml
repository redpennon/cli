name: Release

# Triggered by pushing a version tag: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate oclif manifest
        run: npm run manifest

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: |
          PUBLISHED=$(npm view @redpennon/cli@latest version 2>/dev/null || echo "0.0.0")
          CURRENT=$(node -p "require('./package.json').version")
          HIGHER=$(printf '%s\n' "$PUBLISHED" "$CURRENT" | sort -V | tail -1)
          if [ "$HIGHER" = "$PUBLISHED" ] && [ "$PUBLISHED" != "$CURRENT" ]; then
            npm publish --access public --tag next
            npm dist-tag add @redpennon/cli@${CURRENT} latest
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
